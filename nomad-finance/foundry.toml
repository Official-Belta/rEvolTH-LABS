[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 800
via_ir = false

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 128
depth = 50

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
hyperevm = "${HYPEREVM_RPC_URL}"
hyperevm_testnet = "${HYPEREVM_TESTNET_RPC_URL}"
