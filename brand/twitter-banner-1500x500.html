<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .banner {
    width: 1500px;
    height: 500px;
    background: #050508;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Subtle grid */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,88,238,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,88,238,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  /* Radial glow behind logo */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, rgba(99,88,238,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Content */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 48px;
  }
  .wordmark {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 64px;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .name .dim { font-weight: 300; color: #4a4a5e; }
  .name .bright { font-weight: 700; color: #e8e8ec; }
  .tagline {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #3e3e50;
  }
  /* Decorative side lines */
  .side-line-left {
    position: absolute;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 200px;
    background: linear-gradient(180deg, transparent, rgba(99,88,238,0.15), transparent);
  }
  .side-line-right {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 200px;
    background: linear-gradient(180deg, transparent, rgba(99,88,238,0.15), transparent);
  }
  /* Small floating prism marks */
  .float-mark {
    position: absolute;
    opacity: 0.04;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="side-line-left"></div>
  <div class="side-line-right"></div>

  <!-- Floating background prisms -->
  <svg class="float-mark" style="left: 120px; top: 80px;" width="60" height="66" viewBox="0 0 80 88" fill="none">
    <path d="M40 10 L62 38 L40 58 L18 38 Z" stroke="#6358ee" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  </svg>
  <svg class="float-mark" style="right: 160px; bottom: 100px;" width="44" height="48" viewBox="0 0 80 88" fill="none">
    <path d="M40 10 L62 38 L40 58 L18 38 Z" stroke="#6358ee" stroke-width="2" fill="none" stroke-linejoin="round"/>
  </svg>
  <svg class="float-mark" style="left: 320px; bottom: 60px;" width="32" height="35" viewBox="0 0 80 88" fill="none">
    <path d="M40 10 L62 38 L40 58 L18 38 Z" stroke="#6358ee" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  </svg>
  <svg class="float-mark" style="right: 300px; top: 70px;" width="36" height="40" viewBox="0 0 80 88" fill="none">
    <path d="M40 10 L62 38 L40 58 L18 38 Z" stroke="#6358ee" stroke-width="2" fill="none" stroke-linejoin="round"/>
  </svg>

  <div class="content">
    <!-- Logo mark -->
    <svg width="140" height="154" viewBox="0 0 80 88" fill="none">
      <!-- Diamond -->
      <path d="M40 10 L62 38 L40 58 L18 38 Z" fill="none" stroke="#e8e8ec" stroke-width="1.6" stroke-linejoin="round"/>
      <!-- Inner diamond -->
      <path d="M40 20 L50 38 L40 48 L30 38 Z" fill="none" stroke="#e8e8ec" stroke-width="0.7" stroke-linejoin="round" opacity="0.15"/>
      <!-- Horizontal spread line -->
      <line x1="14" y1="38" x2="66" y2="38" stroke="#e8e8ec" stroke-width="0.5" opacity="0.08"/>
      <!-- Primary orbit -->
      <path d="M40 4 C68 4 76 32 66 48" stroke="url(#pb1)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <!-- Secondary orbit -->
      <path d="M40 62 C12 62 4 38 14 22" stroke="url(#pb2)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <!-- Arrow tips -->
      <path d="M64 44 L66 48 L62 47" stroke="#4a42c0" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M16 26 L14 22 L18 23" stroke="#6358ee" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Center -->
      <circle cx="40" cy="38" r="3.5" fill="#6358ee"/>
      <circle cx="40" cy="38" r="6" fill="none" stroke="#6358ee" stroke-width="0.5" opacity="0.2"/>
      <!-- Apex/bottom nodes -->
      <circle cx="40" cy="10" r="1.8" fill="#e8e8ec" opacity="0.4"/>
      <circle cx="40" cy="58" r="1.8" fill="#e8e8ec" opacity="0.4"/>
      <defs>
        <linearGradient id="pb1" x1="40" y1="4" x2="66" y2="48">
          <stop offset="0%" stop-color="#6358ee"/>
          <stop offset="100%" stop-color="#4a42c0"/>
        </linearGradient>
        <linearGradient id="pb2" x1="40" y1="62" x2="14" y2="22">
          <stop offset="0%" stop-color="#4a42c0"/>
          <stop offset="100%" stop-color="#6358ee"/>
        </linearGradient>
      </defs>
    </svg>

    <!-- Text -->
    <div class="wordmark">
      <div class="name">
        <span class="dim">r</span><span class="bright">E</span><span class="dim">vol</span><span class="bright">TH</span>
      </div>
      <div class="tagline">Automated ETH Yield Vault</div>
    </div>
  </div>
</div>
</body>
</html>
