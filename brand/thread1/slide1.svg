<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#09090b"/>

  <!-- Thread pill — top left, understated -->
  <text x="72" y="56" font-family="Geist, SF Pro, sans-serif" font-size="11" font-weight="500" fill="#3f3f46" letter-spacing="2">01 / 06</text>

  <!-- rEvolTH — bottom right watermark -->
  <text x="1128" y="640" font-family="Geist, SF Pro, sans-serif" font-size="12" text-anchor="end">
    <tspan font-weight="300" fill="#27272a">r</tspan><tspan font-weight="600" fill="#3f3f46">E</tspan><tspan font-weight="300" fill="#27272a">vol</tspan><tspan font-weight="600" fill="#3f3f46">TH</tspan>
  </text>

  <!-- LEFT SIDE — massive 0%, pushed far left, bleeds off slightly -->
  <text x="-20" y="420" font-family="Geist, SF Pro, sans-serif" font-size="320" font-weight="800" fill="#18181b" letter-spacing="-15">0%</text>
  <!-- Label tucked under -->
  <text x="72" y="470" font-family="Geist, SF Pro, sans-serif" font-size="14" font-weight="500" fill="#3f3f46" letter-spacing="3">YOUR ETH</text>

  <!-- RIGHT SIDE — 10% bright, right-aligned, contrasting -->
  <text x="1180" y="340" font-family="Geist, SF Pro, sans-serif" font-size="200" font-weight="800" fill="#e4e4e7" letter-spacing="-10" text-anchor="end">10%</text>
  <text x="1128" y="375" font-family="Geist, SF Pro, sans-serif" font-size="14" font-weight="500" fill="#6358ee" letter-spacing="3" text-anchor="end">WHALES</text>
  <text x="1128" y="400" font-family="Geist, SF Pro, sans-serif" font-size="13" font-weight="400" fill="#52525b" text-anchor="end">Same ETH. Zero liquidation.</text>

  <!-- Thin horizontal line separating the two worlds -->
  <line x1="420" y1="380" x2="780" y2="380" stroke="#27272a" stroke-width="1"/>

  <!-- Hook line — bottom left area -->
  <text x="72" y="580" font-family="Geist, SF Pro, sans-serif" font-size="26" font-weight="600" fill="#a1a1aa">Here's how they do it.</text>

  <!-- Subtle brand accent — single thin vertical line -->
  <line x1="52" y1="540" x2="52" y2="600" stroke="#6358ee" stroke-width="2"/>
</svg>
