<svg width="1600" height="900" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#09090b"/>

  <text x="72" y="56" font-family="Geist, SF Pro, sans-serif" font-size="11" font-weight="500" fill="#3f3f46" letter-spacing="2">02 / 06</text>
  <text x="1128" y="640" font-family="Geist, SF Pro, sans-serif" font-size="12" text-anchor="end">
    <tspan font-weight="300" fill="#27272a">r</tspan><tspan font-weight="600" fill="#3f3f46">E</tspan><tspan font-weight="300" fill="#27272a">vol</tspan><tspan font-weight="600" fill="#3f3f46">TH</tspan>
  </text>

  <!-- Left column — editorial text -->
  <text x="72" y="160" font-family="Geist, SF Pro, sans-serif" font-size="13" font-weight="500" fill="#6358ee" letter-spacing="3">STEP 1</text>
  <text x="72" y="220" font-family="Geist, SF Pro, sans-serif" font-size="48" font-weight="700" fill="#e4e4e7" letter-spacing="-2">Convert ETH</text>
  <text x="72" y="275" font-family="Geist, SF Pro, sans-serif" font-size="48" font-weight="700" fill="#e4e4e7" letter-spacing="-2">to weETH.</text>

  <line x1="72" y1="305" x2="172" y2="305" stroke="#27272a" stroke-width="1"/>

  <text x="72" y="345" font-family="Geist, SF Pro, sans-serif" font-size="15" font-weight="400" fill="#52525b" letter-spacing="0.3">ETH staking 3%</text>
  <text x="72" y="370" font-family="Geist, SF Pro, sans-serif" font-size="15" font-weight="400" fill="#52525b" letter-spacing="0.3">+ EigenLayer restaking ~2%</text>

  <!-- Right column — the number dominates -->
  <text x="1140" y="300" font-family="Geist, SF Pro, sans-serif" font-size="180" font-weight="800" fill="#3ecf8e" text-anchor="end" letter-spacing="-8">~5%</text>
  <text x="1128" y="340" font-family="Geist, SF Pro, sans-serif" font-size="14" font-weight="500" fill="#52525b" text-anchor="end" letter-spacing="2">BASE YIELD</text>

  <!-- Comparison — bottom, minimal bar chart, left-aligned -->
  <line x1="72" y1="440" x2="1128" y2="440" stroke="#18181b" stroke-width="1"/>

  <!-- stETH bar -->
  <text x="72" y="490" font-family="Geist, SF Pro, sans-serif" font-size="13" font-weight="400" fill="#52525b">stETH (Lido)</text>
  <rect x="220" y="476" width="160" height="20" rx="3" fill="#27272a"/>
  <text x="396" y="492" font-family="Geist Mono, monospace" font-size="14" font-weight="500" fill="#52525b">3.0%</text>

  <!-- weETH bar -->
  <text x="72" y="535" font-family="Geist, SF Pro, sans-serif" font-size="13" font-weight="500" fill="#e4e4e7">weETH</text>
  <rect x="220" y="521" width="280" height="20" rx="3" fill="#6358ee"/>
  <text x="516" y="537" font-family="Geist Mono, monospace" font-size="14" font-weight="600" fill="#e4e4e7">5.0%</text>

  <!-- Accent line -->
  <line x1="52" y1="150" x2="52" y2="280" stroke="#6358ee" stroke-width="2"/>
</svg>
