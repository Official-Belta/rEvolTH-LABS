<svg width="1600" height="900" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#09090b"/>

  <text x="72" y="56" font-family="Geist, SF Pro, sans-serif" font-size="11" font-weight="500" fill="#3f3f46" letter-spacing="2">03 / 06</text>
  <text x="1128" y="640" font-family="Geist, SF Pro, sans-serif" font-size="12" text-anchor="end">
    <tspan font-weight="300" fill="#27272a">r</tspan><tspan font-weight="600" fill="#3f3f46">E</tspan><tspan font-weight="300" fill="#27272a">vol</tspan><tspan font-weight="600" fill="#3f3f46">TH</tspan>
  </text>

  <!-- Big loop count — background, massive -->
  <text x="920" y="580" font-family="Geist, SF Pro, sans-serif" font-size="400" font-weight="800" fill="#111114" letter-spacing="-20" text-anchor="middle">3x</text>

  <!-- Left editorial text -->
  <line x1="52" y1="110" x2="52" y2="240" stroke="#6358ee" stroke-width="2"/>
  <text x="72" y="130" font-family="Geist, SF Pro, sans-serif" font-size="13" font-weight="500" fill="#6358ee" letter-spacing="3">THE LOOP</text>
  <text x="72" y="180" font-family="Geist, SF Pro, sans-serif" font-size="40" font-weight="700" fill="#e4e4e7" letter-spacing="-1.5">Deposit. Borrow.</text>
  <text x="72" y="230" font-family="Geist, SF Pro, sans-serif" font-size="40" font-weight="700" fill="#e4e4e7" letter-spacing="-1.5">Convert. Repeat.</text>

  <!-- Steps — stacked vertically, left side, with numbering -->
  <text x="100" y="320" font-family="Geist Mono, monospace" font-size="12" font-weight="400" fill="#3f3f46">01</text>
  <text x="136" y="320" font-family="Geist, SF Pro, sans-serif" font-size="16" font-weight="500" fill="#a1a1aa">Deposit weETH as collateral on Morpho</text>

  <line x1="108" y1="335" x2="108" y2="355" stroke="#27272a" stroke-width="1"/>

  <text x="100" y="372" font-family="Geist Mono, monospace" font-size="12" font-weight="400" fill="#3f3f46">02</text>
  <text x="136" y="372" font-family="Geist, SF Pro, sans-serif" font-size="16" font-weight="500" fill="#a1a1aa">Borrow ETH against it</text>

  <line x1="108" y1="387" x2="108" y2="407" stroke="#27272a" stroke-width="1"/>

  <text x="100" y="424" font-family="Geist Mono, monospace" font-size="12" font-weight="400" fill="#3f3f46">03</text>
  <text x="136" y="424" font-family="Geist, SF Pro, sans-serif" font-size="16" font-weight="500" fill="#a1a1aa">Convert borrowed ETH back to weETH</text>

  <line x1="108" y1="439" x2="108" y2="459" stroke="#27272a" stroke-width="1"/>

  <text x="100" y="476" font-family="Geist Mono, monospace" font-size="12" font-weight="400" fill="#6358ee">04</text>
  <text x="136" y="476" font-family="Geist, SF Pro, sans-serif" font-size="16" font-weight="600" fill="#6358ee">Repeat from step 01</text>

  <!-- Result — bottom -->
  <line x1="72" y1="530" x2="540" y2="530" stroke="#18181b" stroke-width="1"/>
  <text x="72" y="580" font-family="Geist, SF Pro, sans-serif" font-size="18" font-weight="400" fill="#52525b">Result:</text>
  <text x="72" y="615" font-family="Geist, SF Pro, sans-serif" font-size="32" font-weight="700" fill="#e4e4e7">3.5x leverage on your ETH</text>
</svg>
