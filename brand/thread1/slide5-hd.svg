<svg width="1600" height="900" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#09090b"/>

  <text x="72" y="56" font-family="Geist, SF Pro, sans-serif" font-size="11" font-weight="500" fill="#3f3f46" letter-spacing="2">05 / 06</text>
  <text x="1128" y="640" font-family="Geist, SF Pro, sans-serif" font-size="12" text-anchor="end">
    <tspan font-weight="300" fill="#27272a">r</tspan><tspan font-weight="600" fill="#3f3f46">E</tspan><tspan font-weight="300" fill="#27272a">vol</tspan><tspan font-weight="600" fill="#3f3f46">TH</tspan>
  </text>

  <!-- Title -->
  <line x1="52" y1="100" x2="52" y2="170" stroke="#6358ee" stroke-width="2"/>
  <text x="72" y="120" font-family="Geist, SF Pro, sans-serif" font-size="13" font-weight="500" fill="#6358ee" letter-spacing="3">THE MATH</text>
  <text x="72" y="165" font-family="Geist, SF Pro, sans-serif" font-size="36" font-weight="700" fill="#e4e4e7" letter-spacing="-1.5">Yield breakdown</text>

  <!-- Formula — horizontal, typographic, no boxes -->
  <!-- Row 1: The spread calculation -->
  <text x="72" y="260" font-family="Geist Mono, monospace" font-size="13" font-weight="400" fill="#3f3f46">YIELD</text>
  <text x="72" y="310" font-family="Geist, SF Pro, sans-serif" font-size="72" font-weight="800" fill="#3ecf8e" letter-spacing="-4">5%</text>

  <text x="280" y="300" font-family="Geist, SF Pro, sans-serif" font-size="48" font-weight="300" fill="#27272a">-</text>

  <text x="350" y="260" font-family="Geist Mono, monospace" font-size="13" font-weight="400" fill="#3f3f46">BORROW</text>
  <text x="350" y="310" font-family="Geist, SF Pro, sans-serif" font-size="72" font-weight="800" fill="#52525b" letter-spacing="-4">2%</text>

  <text x="540" y="300" font-family="Geist, SF Pro, sans-serif" font-size="48" font-weight="300" fill="#27272a">=</text>

  <text x="610" y="260" font-family="Geist Mono, monospace" font-size="13" font-weight="400" fill="#3f3f46">SPREAD</text>
  <text x="610" y="310" font-family="Geist, SF Pro, sans-serif" font-size="72" font-weight="800" fill="#e4e4e7" letter-spacing="-4">3%</text>

  <!-- Row 2: The multiplication -->
  <line x1="72" y1="360" x2="800" y2="360" stroke="#18181b" stroke-width="1"/>

  <text x="72" y="420" font-family="Geist, SF Pro, sans-serif" font-size="18" font-weight="400" fill="#52525b">Spread</text>
  <text x="190" y="420" font-family="Geist, SF Pro, sans-serif" font-size="18" font-weight="600" fill="#a1a1aa">x 3.5 leverage</text>

  <!-- Big result — right aligned -->
  <text x="1140" y="250" font-family="Geist Mono, monospace" font-size="13" font-weight="400" fill="#3f3f46" text-anchor="end">GROSS</text>
  <text x="1140" y="320" font-family="Geist, SF Pro, sans-serif" font-size="100" font-weight="800" fill="#e4e4e7" text-anchor="end" letter-spacing="-5">~10%</text>

  <!-- Net result — bottom -->
  <text x="72" y="500" font-family="Geist, SF Pro, sans-serif" font-size="15" font-weight="400" fill="#3f3f46">After fees (performance 10% + reserve 3%)</text>

  <text x="72" y="580" font-family="Geist Mono, monospace" font-size="13" font-weight="400" fill="#3f3f46">NET APR</text>
  <text x="72" y="630" font-family="Geist, SF Pro, sans-serif" font-size="56" font-weight="800" fill="#6358ee" letter-spacing="-3">8 — 10%</text>
</svg>
