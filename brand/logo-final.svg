    <stop offset="0%" stop-color="#6358ee" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#6358ee" stop-opacity="0"/>
  </radialGradient>
  <circle cx="200" cy="200" r="140" fill="url(#glow)"/>

  <!-- Upper prism half -->
  <path d="M200 68 L312 200 L200 200 L88 200 Z" fill="#6358ee"/>
